name: Security Preflight

on:
  pull_request:
    branches: [main]
    paths:
      - "ansible/vars/main.yml"
      - "scripts/security-preflight.py"
      - ".github/workflows/security-preflight.yml"

jobs:
  security-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run security preflight
        run: python scripts/security-preflight.py
