<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSINT Challenge Template</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #111827; color: #e5e7eb; }
    .wrap { max-width: 860px; margin: 24px auto; padding: 0 16px; }
    .card { background: #1f2937; border-radius: 10px; padding: 16px; margin-bottom: 14px; border: 1px solid #374151; }
    img { max-width: 100%; border-radius: 8px; border: 1px solid #374151; }
    code { background: #374151; padding: 2px 6px; border-radius: 4px; }
    a { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>OSINT Challenge Template</h1>
    <p>Replace this text with your challenge narrative and instructions.</p>

    <div class="card">
      <h3>Clue 1 (image)</h3>
      <p>Replace <code>clue.png</code> with your own image clue.</p>
      <img src="assets/clue.png" alt="clue png">
    </div>

    <div class="card">
      <h3>Clue 2 (document)</h3>
      <p>Replace <code>final.jpg</code> with your own document or image clue.</p>
      <img src="assets/final.jpg" alt="final jpg">
    </div>

    <div class="card">
      <h3>Instructions</h3>
      <p>Describe here how to combine the clues to find the flag.</p>
    </div>
  </div>
</body>
</html>
