version: '3.8'

services:
  simple-login:
    build: .
    container_name: ctf-simple-login
    ports:
      - "5001:5000"
    environment:
      - FLAG=CTF{Authentification_B4sique_CTF}
      - SECRET_KEY=ChangeMe-SimpleLoginSecret
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
