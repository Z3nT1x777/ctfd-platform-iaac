# Copy this file to ansible/vars/vault.yml and encrypt it with Ansible Vault.
# Example:
#   cp ansible/vars/vault.example.yml ansible/vars/vault.yml
#   ansible-vault encrypt ansible/vars/vault.yml
#
# These values override defaults from ansible/vars/main.yml when vault.yml exists.
# Use strong, randomly generated secrets for production:
#   openssl rand -hex 32   → 64-char hex string (good for signing secrets)
#   openssl rand -base64 24 → URL-safe password (good for tokens/passwords)

