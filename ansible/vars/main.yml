---
ctfd_version: "latest"
ctfd_port: 80
ctfd_db_port: 3306
gitlab_version: "latest"
gitlab_http_port: 8080
gitlab_ssh_port: 2222
prometheus_port: 9090
grafana_port: 3000

# Database
DB_ROOT_PASSWORD: "RootPassword123!"
DB_NAME: "ctfd"
DB_USER: "ctfd"
DB_PASSWORD: "CTFdPassword123!"

# Orchestrator API security (change token outside demo environments)
orchestrator_api_token: "ChangeMe-Orchestrator-Token"
orchestrator_signing_secret: "ChangeMe-Orchestrator-Signing-Secret"
orchestrator_ctfd_webhook_token: "ChangeMe-CTFd-Webhook-Token"
orchestrator_rate_limit_per_min: 60
orchestrator_team_rate_limit_per_min: 30
orchestrator_team_max_active: 3
orchestrator_signature_ttl_sec: 300
orchestrator_audit_log: "/var/log/ctf/orchestrator-audit.log"
orchestrator_api_bind: "127.0.0.1"
orchestrator_api_port: 18181
orchestrator_proxy_listen_port: 8181
