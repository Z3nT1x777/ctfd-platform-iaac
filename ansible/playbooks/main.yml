---
- name: Deploy CTF Platform
  hosts: ctf_servers
  become: yes
  vars_files:
    - ../vars/main.yml
  tasks:
    - name: Print welcome message
      debug:
        msg: "🚀 Démarrage du déploiement CTF Platform..."

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - python3-pip
          - python3-docker
          - python3
          - docker-compose-plugin
          - nginx
          - git
        state: present

    - name: Install prometheus_client for orchestrator metrics
      pip:
        name: prometheus_client
        state: present
        executable: pip3

    - name: Load optional vaulted overrides
      include_vars:
        file: ../vars/vault.yml
        name: vault_overrides
      failed_when: false
      no_log: true

    - name: Build effective secret values
      set_fact:
        db_root_password_effective: "{{ vault_overrides.DB_ROOT_PASSWORD | default(DB_ROOT_PASSWORD) }}"
        db_password_effective: "{{ vault_overrides.DB_PASSWORD | default(DB_PASSWORD) }}"
        orchestrator_api_token_effective: "{{ vault_overrides.orchestrator_api_token | default(orchestrator_api_token) }}"
        orchestrator_signing_secret_effective: "{{ vault_overrides.orchestrator_signing_secret | default(orchestrator_signing_secret) }}"
        orchestrator_ctfd_webhook_token_effective: "{{ vault_overrides.orchestrator_ctfd_webhook_token | default(orchestrator_ctfd_webhook_token) }}"
        grafana_admin_password_effective: "{{ vault_overrides.grafana_admin_password | default(grafana_admin_password) }}"
        ctfd_api_token_effective: "{{ vault_overrides.ctfd_api_token | default(ctfd_api_token) }}"
      no_log: true

    - name: Resolve orchestrator quota profile
      vars:
        quota_profiles:
          small:
            team_max_active: 6
            team_challenge_max_active: 1
            team_rate_limit_per_min: 20
          medium:
            team_max_active: 10
            team_challenge_max_active: 2
            team_rate_limit_per_min: 30
          large:
            team_max_active: 20
            team_challenge_max_active: 3
            team_rate_limit_per_min: 60
      set_fact:
        orchestrator_team_max_active: "{{ quota_profiles[orchestrator_quota_profile].team_max_active }}"
        orchestrator_team_challenge_max_active: "{{ quota_profiles[orchestrator_quota_profile].team_challenge_max_active }}"
        orchestrator_team_rate_limit_per_min: "{{ quota_profiles[orchestrator_quota_profile].team_rate_limit_per_min }}"
      when:
        - orchestrator_quota_profile is defined
        - orchestrator_quota_profile in quota_profiles

    - name: Validate quota profile input
      fail:
        msg: "Invalid orchestrator_quota_profile='{{ orchestrator_quota_profile }}'. Allowed values: small, medium, large."
      when:
        - orchestrator_quota_profile is defined
        - orchestrator_quota_profile not in ['small', 'medium', 'large']

    - name: Print quota profile summary
      debug:
        msg: >-
          Quota profile={{ orchestrator_quota_profile | default('custom') }};
          team_max_active={{ orchestrator_team_max_active }};
          team_challenge_max_active={{ orchestrator_team_challenge_max_active }};
          team_rate_limit_per_min={{ orchestrator_team_rate_limit_per_min }}

    - name: Create orchestrator directory
      file:
        path: /opt/ctf/orchestrator
        state: directory
        mode: '0755'

    - name: Create orchestrator state directory
      file:
        path: /opt/ctf/orchestrator/state
        state: directory
        mode: '0700'

    - name: Create orchestrator config directory
      file:
        path: /etc/ctf
        state: directory
        mode: '0700'

    - name: Create orchestrator audit log directory
      file:
        path: /var/log/ctf
        state: directory
        mode: '0750'

    - name: Deploy player instance manager script
      copy:
        src: /vagrant/scripts/player-instance-manager.sh
        dest: /opt/ctf/orchestrator/player-instance-manager.sh
        mode: '0755'

    - name: Normalize manager script line endings
      shell: sed -i 's/\r$//' /opt/ctf/orchestrator/player-instance-manager.sh
      args:
        executable: /bin/bash

    - name: Deploy player instance API script
      copy:
        src: /vagrant/scripts/player-instance-api.py
        dest: /opt/ctf/orchestrator/player-instance-api.py
        mode: '0755'

    - name: Deploy orchestrator environment file
      template:
        src: ../templates/orchestrator.env.j2
        dest: /etc/ctf/orchestrator.env
        mode: '0600'

    - name: Install player instance API service
      template:
        src: ../templates/player-instance-api.service.j2
        dest: /etc/systemd/system/player-instance-api.service
        mode: '0644'

    - name: Install player instance cleanup service
      template:
        src: ../templates/player-instance-cleanup.service.j2
        dest: /etc/systemd/system/player-instance-cleanup.service
        mode: '0644'

    - name: Install player instance cleanup timer
      template:
        src: ../templates/player-instance-cleanup.timer.j2
        dest: /etc/systemd/system/player-instance-cleanup.timer
        mode: '0644'

    - name: Remove legacy osint-static.conf from conf.d (old Copilot approach)
      file:
        path: /etc/nginx/conf.d/osint-static.conf
        state: absent

    - name: Stop any container occupying port 80 before nginx reconfiguration
      shell: |
        cids=$(docker ps --filter "publish=80" -q 2>/dev/null)
        if [ -n "$cids" ]; then
          echo "Stopping containers on port 80: $cids"
          docker stop $cids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Create OSINT static web root
      file:
        path: "{{ osint_static_web_root }}"
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0755'

    - name: Install CTFd frontend nginx config (port 80 + /osint/ static)
      template:
        src: ../templates/ctfd-nginx.conf.j2
        dest: /etc/nginx/sites-available/ctfd.conf
        mode: '0644'

    - name: Enable CTFd nginx site
      file:
        src: /etc/nginx/sites-available/ctfd.conf
        dest: /etc/nginx/sites-enabled/ctfd.conf
        state: link

    - name: Install orchestrator nginx reverse proxy
      template:
        src: ../templates/orchestrator-api.nginx.conf.j2
        dest: /etc/nginx/sites-available/orchestrator-api.conf
        mode: '0644'

    - name: Enable orchestrator nginx site
      file:
        src: /etc/nginx/sites-available/orchestrator-api.conf
        dest: /etc/nginx/sites-enabled/orchestrator-api.conf
        state: link

    - name: Disable default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Validate nginx configuration
      command: nginx -t
      changed_when: false

    - name: Reload systemd units
      systemd:
        daemon_reload: yes

    - name: Enable and restart player instance API service
      systemd:
        name: player-instance-api.service
        enabled: yes
        state: restarted

    - name: Enable and restart nginx
      systemd:
        name: nginx
        enabled: yes
        state: restarted

    - name: Enable and start player instance cleanup timer
      systemd:
        name: player-instance-cleanup.timer
        enabled: yes
        state: started

    - name: Create project directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/ctf
        - /opt/ctf/ctfd
        - /opt/ctf/gitlab
        - /opt/ctf/monitoring

    - name: Copy docker-compose files
      template:
        src: "../templates/docker-compose-{{ item }}.yml.j2"
        dest: "/opt/ctf/{{ item }}/docker-compose.yml"
      loop:
        - ctfd
#        - gitlab
        - monitoring

    - name: Start CTFd
      community.docker.docker_compose_v2:
        project_src: /opt/ctf/ctfd
        state: present

    - name: Copy Prometheus config
      template:
        src: "../templates/prometheus.yml.j2"
        dest: "/opt/ctf/monitoring/prometheus.yml"
        mode: '0644'

    - name: Create Grafana provisioning directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/ctf/monitoring/grafana/provisioning/datasources
        - /opt/ctf/monitoring/grafana/provisioning/dashboards
        - /opt/ctf/monitoring/grafana/dashboards

    - name: Deploy Grafana Prometheus datasource
      template:
        src: "../templates/grafana-datasource.yml.j2"
        dest: "/opt/ctf/monitoring/grafana/provisioning/datasources/prometheus.yml"
        mode: '0644'

    - name: Deploy Grafana dashboard provider
      template:
        src: "../templates/grafana-dashboard-provider.yml.j2"
        dest: "/opt/ctf/monitoring/grafana/provisioning/dashboards/ctf-ops.yml"
        mode: '0644'

    - name: Deploy CTF operations dashboard
      copy:
        src: "/vagrant/ansible/grafana-dashboards/ctf-ops.json"
        dest: "/opt/ctf/monitoring/grafana/dashboards/ctf-ops.json"
        mode: '0644'

    - name: Start monitoring stack
      community.docker.docker_compose_v2:
        project_src: /opt/ctf/monitoring
        state: present

    - name: Wait for CTFd to be ready
      uri:
        url: "http://localhost:{{ ctfd_port }}"
        status_code: [200, 302]
        return_content: no
      register: result
      until: result.status in [200, 302]
      retries: 30
      delay: 10


    - name: Pre-build all Docker challenge images
      shell: |
        set -e
        find /vagrant/challenges -name docker-compose.yml | while read compose_file; do
          dir=$(dirname "$compose_file")
          if grep -q '^  build:' "$compose_file" 2>/dev/null || grep -q '^\s*build:' "$compose_file" 2>/dev/null; then
            echo "[pre-build] Building $dir"
            docker compose -f "$compose_file" build --quiet 2>&1 | tail -3 || true
          fi
        done
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Sync OSINT static challenge assets to web root
      command: >
        python3 /vagrant/scripts/sync_osint_static.py
        --target {{ osint_static_web_root }}
        --challenges-root /vagrant/challenges
      register: osint_sync_result
      changed_when: "'Synchronisé' in osint_sync_result.stdout or 'copied' in osint_sync_result.stdout"
      failed_when: false

    - name: Create /opt/ctf-flags directory (container-escape flag host path)
      file:
        path: /opt/ctf-flags
        state: directory
        mode: '0755'

    - name: Deploy container-escape flag on host
      copy:
        content: "CTF{docker_socket_escape_to_host}\n"
        dest: /opt/ctf-flags/container-escape.txt
        mode: '0644'

    - name: Sync challenges to CTFd via API
      command: >
        python3 /vagrant/scripts/sync_challenges_ctfd.py
        --ctfd-url http://127.0.0.1:{{ ctfd_internal_port }}
        --api-token {{ ctfd_api_token_effective }}
        --challenges-root /vagrant/challenges
        --instance-base-url http://{{ ctf_vm_ip }}
        --connection-mode launch-link
      register: challenges_sync_result
      changed_when: false
      failed_when: false
      when: ctfd_api_token_effective | length > 0

    - name: Show challenge sync result
      debug:
        msg: "{{ challenges_sync_result.stdout_lines | default(['(skipped — set ctfd_api_token in vault.yml)']) }}"

    # ── Vault warning ──────────────────────────────────────────────────────
    - name: Warn about default secrets (non-production)
      debug:
        msg: |
          ⚠️  ATTENTION — Des secrets par défaut sont détectés :
          {% if orchestrator_api_token_effective == 'ChangeMe-Orchestrator-Token' %}  - orchestrator_api_token est 'ChangeMe-*' → définir dans ansible/vars/vault.yml{% endif %}
          {% if db_password_effective == 'ctf_secure_password' or db_password_effective == 'REPLACE_ME' %}  - DB_PASSWORD est la valeur par défaut{% endif %}
          {% if grafana_admin_password_effective == 'admin' %}  - grafana_admin_password est 'admin'{% endif %}
          Copier ansible/vars/vault.example.yml → vault.yml et renseigner des vraies valeurs avant un CTF public.
      when: >-
        orchestrator_api_token_effective == 'ChangeMe-Orchestrator-Token' or
        grafana_admin_password_effective == 'admin' or
        db_password_effective == 'ctf_secure_password'

    # ── Log rotation ───────────────────────────────────────────────────────
    - name: Install logrotate config for orchestrator logs
      copy:
        dest: /etc/logrotate.d/ctf-orchestrator
        content: |
          /var/log/ctf/*.log {
              daily
              rotate 14
              compress
              delaycompress
              missingok
              notifempty
              create 0640 root root
              postrotate
                  systemctl restart player-instance-api 2>/dev/null || true
              endscript
          }
        mode: "0644"

    - name: Create CTF log and state directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /var/log/ctf
        - /var/lib/ctf

    # ── Daily backup CTFd DB ───────────────────────────────────────────────
    - name: Install CTFd DB backup script
      copy:
        dest: /usr/local/bin/ctfd-backup.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -euo pipefail
          BACKUP_DIR="/var/backups/ctfd"
          mkdir -p "$BACKUP_DIR"
          FILENAME="ctfd-$(date +%Y%m%d-%H%M%S).sql.gz"
          docker exec ctfd-db mysqldump -u ctfd -p"{{ db_password_effective }}" ctfd 2>/dev/null \
            | gzip > "$BACKUP_DIR/$FILENAME"
          # Keep last 14 backups
          ls -t "$BACKUP_DIR"/*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm --
          echo "Backup OK: $BACKUP_DIR/$FILENAME"

    - name: Schedule daily CTFd DB backup (cron)
      cron:
        name: "CTFd daily backup"
        minute: "30"
        hour: "3"
        job: "/usr/local/bin/ctfd-backup.sh >> /var/log/ctf/backup.log 2>&1"
        state: present

    - name: Success message
      debug:
        msg: >-
          ✅ CTF Platform déployée —
          CTFd: http://{{ ctf_vm_ip }} |
          Orchestrator: http://{{ ctf_vm_ip }}:{{ orchestrator_proxy_listen_port }}/ui |
          Admin plugin: http://{{ ctf_vm_ip }}/plugins/orchestrator/admin |
          OSINT: http://{{ ctf_vm_ip }}/osint/
