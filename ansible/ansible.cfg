[defaults]
inventory = inventory
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
# vault_password_file is intentionally NOT set here.
# The Vagrantfile passes --vault-password-file only when .vault_pass exists (prod).
# In dev mode (fresh clone), vault.yml is plain text — no password file needed.

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False